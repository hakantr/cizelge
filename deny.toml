# cargo-deny yapılandırması — FAZ_PLANI.md'deki değiştirilemez lisans
# kuralının otomatik denetimi. Çalıştırma: `cargo deny check licenses`
#
# POLİTİKA (kullanıcı onaylı, 2026-07-17): MIT, BSD-2/3, ISC, CC0,
# Apache-2.0 ve MPL-2.0. MPL-2.0 koşulu: MPL'li kod DEĞİŞTİRİLMEZ;
# değiştirilirse o değişiklikler açık kaynak olarak yayımlanır (bkz. NOTICE).
# KENDİMİZ GELİŞTİRİRİZ İLKESİ: bir gereksinim yalnızca bu listenin
# dışındaki bir lisansla karşılanabiliyorsa bağımlılık alınmaz; eşdeğeri
# bu projede Apache-2.0 altında geliştirilir (FAZ_PLANI madde 3).

[licenses]
allow = [
    # --- Onaylı politika listesi ---
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Apache-2.0",
    "MPL-2.0",

    # --- Zorunlu ekosistem ekleri (izin verici; kullanıcı onayına sunuldu) ---
    # unicode-ident ve ICU crate'leri: Unicode veri tablosu lisansı; Rust
    # ekosisteminde fiilen kaçınılmaz (proc-macro2/syn zinciri).
    "Unicode-3.0",
    # foldhash, nanorand (gpui geçişli): Zlib — izin verici, MIT eşdeğeri.
    "Zlib",
    # linux-raw-sys/rustix/ar_archive_writer: Apache-2.0'ın LLVM istisnalı
    # biçimi (ek özgürlük tanır, kısıt eklemez).
    "Apache-2.0 WITH LLVM-exception",
    # libbz2-rs-sys: bzip2 lisansı — BSD tarzı izin verici.
    "bzip2-1.0.6",
    # aho-corasick/byteorder ikili lisansı; MIT dalı da mevcut, Unlicense
    # sıralamada öne çıkabildiği için listede.
    "Unlicense",
]
confidence-threshold = 0.9

# Bağımsız GPUI çalışma alanındaki `gpui_shared_string` ve `gpui_util`
# manifestleri lisans alanı bildirmiyor. Bu belirsizlik `../gpui/NOTICE`
# ve `../gpui/EXTRACTION.md` içinde kayıtlıdır; burada sessizce lisans
# eşlemesi yapılmaz.

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# gpui, sabitlenmiş bağımsız `../gpui` çalışma alanından yerel yol
# bağımlılığıyla gelir; bkz. FAZ_PLANI.md lisans kuralı madde 4.
